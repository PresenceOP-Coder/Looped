name: looped
description: A professional habit tracker built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  
  flutter_riverpod: ^2.4.0
  

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  lucide_icons: 0.257.0
  json_annotation: ^4.8.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  smooth_page_indicator: ^1.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  flutter_timezone: ^3.0.1
  android_alarm_manager_plus: ^4.0.4
  flutter_ringtone_player: ^4.0.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.14.4
  
  # Code Generation for Hive and JSON
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/icons/looped_logo.png"